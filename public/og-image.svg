<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" aria-labelledby="title description" role="img" viewBox="0 0 1200 630"><title id="title">Flag Paths citizenship and residency atlas</title><desc id="description">A route travels between labelled destinations across a dark cartographic grid beside the Flag Paths wordmark.</desc><defs><pattern id="grid" width="74" height="74" patternUnits="userSpaceOnUse"><path fill="none" stroke="#353934" stroke-width="1" d="M74 0H0V74"/></pattern><linearGradient id="wash" x1="0" x2="1"><stop offset="0" stop-color="#191A18"/><stop offset=".62" stop-color="#1C1E1D"/><stop offset="1" stop-color="#252A36"/></linearGradient><filter id="glow" width="300%" height="300%" x="-100%" y="-100%"><feGaussianBlur stdDeviation="10"/></filter></defs><rect width="1200" height="630" fill="url(#wash)"/><rect width="1200" height="630" fill="url(#grid)" opacity=".62"/><g transform="translate(70 66)"><path fill="none" stroke="#91A4FF" stroke-linecap="round" stroke-width="3.5" d="M4 34c0-14 8-19 18-19 11 0 12-14 23-14"/><circle cx="4" cy="34" r="5" fill="#EEEAE1" stroke="#91A4FF" stroke-width="2.5"/><circle cx="45" cy="1" r="5" fill="#91A4FF" stroke="#EEEAE1" stroke-width="2.5"/><text x="66" y="24" fill="#EEEAE1" font-family="Georgia, serif" font-size="36" font-weight="700">Flag Paths</text><text x="67" y="47" fill="#9DA099" font-family="ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="3">MOBILITY ATLAS</text></g><g><text fill="#91A4FF" font-family="ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="3" transform="translate(70 226)">CITIZENSHIP · RESIDENCY · MOBILITY</text><text y="78" fill="#EEEAE1" font-family="Georgia, serif" font-size="58" font-weight="700" transform="translate(70 226)">See what one status</text><text y="144" fill="#B8BAB4" font-family="Georgia, serif" font-size="58" font-weight="700" transform="translate(70 226)">can unlock next.</text><text y="204" fill="#A9ABA6" font-famil