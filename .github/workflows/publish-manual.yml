name: Publish reviewed news (manual)

# Manually publish human-reviewed news items to the Telegram channel, using the
# same clean format as the automated news path. Pass the posts as a JSON array
# via the `posts` input — nothing post-specific is committed to the repo.
#
#   gh workflow run publish-manual.yml -f posts="$(cat posts.json)"

on:
  workflow_dispatch:
    inputs:
      posts:
        description: "JSON array of findings to publish (iso_n3, headline, brief, primary_urls, …)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: telegram-manual
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: telegram-publication
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
      MANUAL_POSTS: ${{ inputs.posts }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish reviewed posts
        run: bun scripts/publish_manual.ts --apply
