name: Publish reviewed news (manual)

# Manually publish human-reviewed news items (monitor/publish/manual-posts.json)
# to the Telegram channel, using the same clean format as the automated news
# path. For leads the auto-audit held but a reviewer has verified.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-manual
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: telegram-publication
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish reviewed posts
        run: bun scripts/publish_manual.ts --apply
